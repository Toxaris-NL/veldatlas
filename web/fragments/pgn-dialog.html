<div id="pgnDialog" class="modal hidden">
  <div class="modal-backdrop" data-close-dialog="pgnDialog"></div>
  <div class="modal-card large-modal">
    <div class="modal-header"><h2>Open PGN</h2><button class="icon-button" data-close-dialog="pgnDialog">✕</button></div>
    <p class="muted">Load a PGN from file or paste text manually.</p>
    <div class="form-card"><h3>Upload file</h3><div class="toolbar"><input id="pgnFileInput" type="file" accept=".pgn,.txt,text/plain,application/x-chess-pgn"><button id="pgnFileLoadBtn" type="button">Load selected file</button></div><div id="pgnFileName" class="muted">No file selected.</div></div>
    <div class="form-card"><h3>Or paste PGN text</h3><textarea id="pgnTextInput" rows="12" placeholder="Paste PGN here..."></textarea></div>
    <div class="toolbar"><button id="pgnLoadBtn" type="button">Load pasted PGN</button><button data-close-dialog="pgnDialog" type="button">Cancel</button></div>
  </div>
</div>
