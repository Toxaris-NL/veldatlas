<div id="fenDialog" class="modal hidden">
  <div class="modal-backdrop" data-close-dialog="fenDialog"></div>
  <div class="modal-card">
    <div class="modal-header"><h2>Enter FEN</h2><button class="icon-button" data-close-dialog="fenDialog">✕</button></div>
    <p class="muted">Validation runs while typing. Load stays disabled until valid.</p>
    <label>FEN<input id="fenInput" type="text" placeholder="rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"></label>
    <div id="fenValidationHint" class="validation-hint muted">Enter a full 6-part FEN.</div>
    <div id="fenError" class="form-error hidden"></div>
    <div class="toolbar"><button id="fenLoadBtn" type="button" disabled>Load FEN</button><button id="fenResetBtn" type="button">Start position</button><button data-close-dialog="fenDialog" type="button">Cancel</button></div>
  </div>
</div>
